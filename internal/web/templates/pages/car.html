<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="referrer" content="no-referrer">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0f172a">
    <title>车载音乐 · music-dl</title>
    <link rel="icon" href="{{.Root}}/icon.png" type="image/png">
    <link rel="stylesheet" href="{{.Root}}/car.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/aplayer/dist/APlayer.min.css">
</head>
<body class="car-body">

<div class="car-shell">
    <header class="car-topbar">
        <div class="car-brand">
            <span class="car-brand-icon">♪</span>
            <span class="car-brand-text">车载音乐</span>
        </div>
        <div class="car-clock" id="car-clock">--:--</div>
        <div class="car-topbar-actions">
            <button class="car-icon-btn" id="car-settings-btn" title="设置">
                <svg viewBox="0 0 24 24"><path fill="currentColor" d="M19.14 12.94c.04-.31.06-.62.06-.94 0-.32-.02-.63-.06-.94l2.03-1.58a.49.49 0 0 0 .12-.61l-1.92-3.32a.488.488 0 0 0-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54a.484.484 0 0 0-.48-.41h-3.84a.484.484 0 0 0-.48.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.04.31-.07.63-.07.94 0 .31.03.63.07.94l-2.03 1.58c-.18.14-.23.4-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.25.41.48.41h3.84c.23 0 .43-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6A3.6 3.6 0 0 1 8.4 12 3.6 3.6 0 0 1 12 8.4a3.6 3.6 0 0 1 3.6 3.6 3.6 3.6 0 0 1-3.6 3.6z"/></svg>
            </button>
            <a class="car-icon-btn" href="{{.Root}}/" title="返回手机版">
                <svg viewBox="0 0 24 24"><path fill="currentColor" d="M17 1H7c-1.1 0-2 .9-2 2v18c0 1.1.9 2 2 2h10c1.1 0 2-.9 2-2V3c0-1.1-.9-2-2-2zm0 18H7V5h10v14z"/></svg>
            </a>
        </div>
    </header>

    <nav class="car-sidebar">
        <button class="car-nav-item active" data-view="home">
            <svg viewBox="0 0 24 24"><path fill="currentColor" d="M12 3l9 8h-3v8h-4v-6h-4v6H6v-8H3z"/></svg>
            <span>首页</span>
        </button>
        <button class="car-nav-item" data-view="favorites">
            <svg viewBox="0 0 24 24"><path fill="currentColor" d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
            <span>收藏</span>
        </button>
        <button class="car-nav-item" data-view="recent">
            <svg viewBox="0 0 24 24"><path fill="currentColor" d="M13 3a9 9 0 1 0 9 9h-2a7 7 0 1 1-7-7V3zm-1 5v5l4.25 2.52.75-1.23-3.5-2.08V8z"/></svg>
            <span>最近</span>
        </button>
        <button class="car-nav-item" data-view="local">
            <svg viewBox="0 0 24 24"><path fill="currentColor" d="M12 3v10.55A4 4 0 1 0 14 17V7h4V3z"/></svg>
            <span>本地音乐</span>
        </button>
        <button class="car-nav-item" data-view="collections">
            <svg viewBox="0 0 24 24"><path fill="currentColor" d="M4 6h16v2H4zm0 5h16v2H4zm0 5h10v2H4z"/></svg>
            <span>本地歌单</span>
        </button>
        <button class="car-nav-item" data-view="recommend">
            <svg viewBox="0 0 24 24"><path fill="currentColor" d="M12 .587l3.668 7.568L24 9.423l-6 5.85L19.336 24 12 19.897 4.664 24 6 15.273l-6-5.85 8.332-1.268z"/></svg>
            <span>每日推荐</span>
        </button>
        <button class="car-nav-item" data-view="search">
            <svg viewBox="0 0 24 24"><path fill="currentColor" d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
            <span>搜索</span>
        </button>
    </nav>

    <main class="car-content" id="car-content">
        <div class="car-loading">加载中…</div>
    </main>

    <aside class="car-now-playing" id="car-now-playing">
        <div class="car-np-cover" id="car-np-cover">
            <svg class="car-np-cover-placeholder" viewBox="0 0 24 24"><path fill="currentColor" d="M12 3v10.55A4 4 0 1 0 14 17V7h4V3z"/></svg>
        </div>
        <div class="car-np-info">
            <div class="car-np-title" id="car-np-title">未在播放</div>
            <div class="car-np-artist" id="car-np-artist">选择歌曲开始播放</div>
        </div>
        <div class="car-np-progress">
            <input type="range" id="car-seek" min="0" max="1000" value="0" step="1">
            <div class="car-np-times">
                <span id="car-time-cur">00:00</span>
                <span id="car-time-total">00:00</span>
            </div>
        </div>
        <div class="car-np-controls">
            <button class="car-btn car-btn--ghost" id="car-prev" title="上一曲">
                <svg viewBox="0 0 24 24"><path fill="currentColor" d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
            </button>
            <button class="car-btn car-btn--play" id="car-play" title="播放/暂停">
                <svg id="car-play-icon" viewBox="0 0 24 24"><path fill="currentColor" d="M8 5v14l11-7z"/></svg>
            </button>
            <button class="car-btn car-btn--ghost" id="car-next" title="下一曲">
                <svg viewBox="0 0 24 24"><path fill="currentColor" d="M16 6h2v12h-2zM6 18l8.5-6L6 6z"/></svg>
            </button>
        </div>
        <div class="car-np-extra">
            <button class="car-mini-btn" id="car-fav" title="收藏">
                <svg viewBox="0 0 24 24"><path fill="currentColor" d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                <span>收藏</span>
            </button>
            <button class="car-mini-btn" id="car-mode" title="播放模式">
                <svg viewBox="0 0 24 24"><path fill="currentColor" d="M17.65 6.35A7.95 7.95 0 0 0 12 4a8 8 0 1 0 7.74 10h-2.08A6 6 0 1 1 12 6c1.66 0 3.14.69 4.22 1.78L13 11h7V4z"/></svg>
                <span id="car-mode-label">列表循环</span>
            </button>
            <button class="car-mini-btn" id="car-queue-toggle" title="队列">
                <svg viewBox="0 0 24 24"><path fill="currentColor" d="M4 10h12v2H4zm0-4h12v2H4zm0 8h8v2H4zm10 0v6l5-3z"/></svg>
                <span>队列</span>
            </button>
        </div>
        <div class="car-np-queue" id="car-np-queue">
            <div class="car-queue-empty">队列为空</div>
        </div>
    </aside>
</div>

<!-- 隐藏的 APlayer 容器(只用其引擎,UI 不显示) -->
<div id="aplayer" class="car-aplayer-hidden"></div>

<script src="https://cdn.jsdelivr.net/npm/aplayer/dist/APlayer.min.js"></script>
<script>
    window.API_ROOT = "{{.Root}}";
</script>
<script src="{{.Root}}/car.js"></script>

</body>
</html>
